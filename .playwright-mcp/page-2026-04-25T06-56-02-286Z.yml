              - heading "핵심 요약" [level=3] [ref=e98]
              - paragraph [ref=e100]: 현대모비스의 자동차 제동장치 수출을 위해 중국, 미국, 일본을 핵심 전략 시장으로 분석하였으며, 특히 중국은 최대 수요처로서 IATF 16949 및 CCC 인증 대응이 필수적입니다. 미국은 결제 안정성이 높으나 정책적 관세 불확실성을 고려해야 하며, 일본은 지리적 이점과 고품질 수요가 크지만 폐쇄적인 공급망 구조가 진입 장벽으로 작용합니다. 현재 HS코드 선택 신뢰도가 낮고 검토가 필요한 상태이므로, 최종 규제 준수 결정을 내리기 전에 반드시 정확한 HS/HSK 코드 분류 확정이 선행되어야 합니다.
