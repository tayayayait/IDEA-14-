                    - paragraph [ref=e665]: "절차: 1. 인증 신청 2. 공장 심사(Initial assessment) - 제품 형식 승인 이후, 제조사가 품질 시스템(ISO 9001) 혹은 적합한 품질 표준을 기반으로 제품의 양산 적합성(CoP)을 유지할 수 있는지 평가하는 사전 심사로 인증 최초 취득 시에만 진행 3. 참관 시험 및 서류 심사(Witness test and documentation) 1) 제조사는 인증 신청서와 함께 도면, 스펙 등의 제품 기본 정보 및 법규에서 요구하는 정보를 바탕으로 기술 시험 보고서 작성 2) 제출된 서류들을 검토 후 형식 승인 인증서 발급 4. 인증서 발급 및 양산 적합성 확인(CoP audit) - ECE 또는 EC 형식 승인을 사용하는 승인 기관은 생산된 부품이 형식을 준수하는지 확인하기 위해 제조사를 대상으로 CoP 감사를 통해 양산 적합성을 준수하는지 관리한다. 감사 후 제품이 기존 양산 적합성 조건을 만족시키지 못 할 경우 승인은 철회될 수 있다."
