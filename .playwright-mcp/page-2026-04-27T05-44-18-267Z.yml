                - listitem [ref=e695]:
                  - paragraph [ref=e696]: "- 전압 공급이 220Vac, 50Hz인 벌크헤드형 LED 조명기구(Bulkhead Type LED Light Fittings), LED 다운라이트(LED Downlight) 또는 LED 플러드라이트(LED Floodlight) - 도로, 거리 및 터널 조명용으로 사용되며, 전압 공급이 1,000Vac, 50Hz 이하인 LED 도로 조명등(LED Road Light)"
                  - generic [ref=e697]:
                    - paragraph [ref=e698]: "필요서류: 1. 인증 기관이 정한 양식에 따라 작성된 신청서 2. 수수료 3. 평가를 위한 품질 매뉴얼 및 관련 문서 4. 인증 기관과의 공식 연락을 담당할 공급업체의 담당자 정보"
                    - paragraph [ref=e699]: "절차: 공급업체가 인증 기관에 인증 신청서를 제출--> 공급업체는 LED 조명 제품의 샘플을 인증 기관에 제출하여 초기 형식 시험(initial type tests)을 진행--> 인증 기관은 LED 조명 제품의 시험 보고서를 검토--> 인증 기관은 LED 조명 제품 생산 공장의 생산 설비, 생산 공정 및 완제품을 평가--> 모든 평가가 완료되면, 인증 기관은 공급업체에게 적합성 인증서(Certificate of Conformity)를 발급"
                    - paragraph [ref=e700]: "유효기간: 1년 - 인증을 받은 LED 조명 제품은 인증 상태 유지를 위해 매년 재평가를 받아야 함 - 인증서 최초 발급 및 갱신 시, 공급업체는 연간 인증 비용을 납부해야 함"
