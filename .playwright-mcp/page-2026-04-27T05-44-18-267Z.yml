                - listitem [ref=e719]:
                  - paragraph [ref=e720]: "ㅇ 품목 정의에 명시된 수입산 치과용 임플란트 ㅇ 예외 사례: 유통 등록 면제 대상 1. 연구, 테스트, 검사(실험, 성능 평가, 사용 지침 또는 기기 개조) 목적으로 수입된 치과용 임플란트 2. 인도주의적 의료 서비스 제공을 위해 수입된 치과용 임플란트 3. 무역 박람회 및 전시회 전시용, 제품 출시 행사용, 의료기관 증정용, 의료기관의 특별 진단용 혹은 특정 개인의 치료용으로 수입되는 치과용 임플란트 4. 중고 치과용 임플란트 - 연구 및 훈련용으로 수입되지만 인체 사용이나 치료 목적은 아님 - 무역 박람회나 전시회 참여, 소개 및 전시를 위한 재수출 목적의 일시적 수입 ㅇ 1~4번의 경우 수입 허가가 필요함 5. 기타 목적의 중고 치과용 임플란트는 수입이 금지됨필수"
                  - generic [ref=e721]:
                    - paragraph [ref=e722]: "필요서류: ㅇ 수입산 치과용 임플란트 신규 유통 번호 급행 발급시 필요 서류 1. 신청서(10/2023/TT-BYT, 부록I, C&D등급 양식 제03.05) - 베트남 내 신청자 2. 유효한 ISO 13845 품질 관리 기준 적합성 증명서 - 외국 공급업체 3. 제품 소유주가 베트남 내 신청인을 위해 발급한 유효한 위임장 - 외국 공급업체 4. 제품 소유주가 발급한 보중 서비스 제공 자격 증명서(제품 소유주가 일회용 의료기기로 정의하거나 품목이 보증 대상이 아님을 증명하는 서류가 있는 경우는 제외) - 외국 공급업체 5. 유효한 CFS 또는 판매 허가증(한국산 제품의 경우 MFDS 발급) -- 외국 공급업체 6. ASEAN CSDT (공통 제출 서류 양식), 아래의 내용이 포함됨(상세 지침은 결정문 2426/QD-BYT 참조) - 베트남 내 신청자 6.1. - 베트남 내 신청자 - 한국산 치과용 임플란트(제품) 개요 - 상업적 판매 이력 - 사용 목적 및 사용법 - 세계 각국에서의 등록 현황 - 주요 안전성 및 성능 관련 정보 6.2. - 필수 원칙 준수 점검표(베트남어 또는 영어) -- 베트남 내 신청자 6.3. - 베트남 내 신청자 ㅇ 의료기기 설명 - 의료기기 설명 및 특징 - 사용 목적 - 표시사항 - 사용 설명서 - 금기사항 - 경고 - 주의사항 - 잠재적 부작용 - 대체 치료법 - 재료(베트남어 또는 영어) - 기타 관련 사양 - 기타 설명 정보 6.4. - 베트남 내 신청자 ㅇ 설계 검증 및 확인 문서 요약(베트남어 또는 영어) - 비임상 연구 - 임상 증거 6.5. - 베트남 내 신청자 ㅇ 라벨링 - 치과 임플란트 및 포장재에 부착된 원본 라벨 및 베트남어 부속 라벨 샘플 - 베트남어 사용 설명서 6.6. - 베트남 내 신청자 ㅇ 위험 분석(베트남어 또는 영어) - 위험 분석 결과 6.7. - 베트남 내 신청자 ㅇ 제조 정보 - 제조업체 정보 - 제조 공정 ㅇ 수입산 치과용 임플란트 신규 유통 번호 일반 발급시 필요 서류 1~6. 수입산 치과용 임플란트 신규 유통 번호 급행 발급시 필요 서류 1~6번과 같음 - 베트남 내 신청자, 외국 공급업체 7. 베트남 보건부 지정 기관이 발급한 ASEAN CSDT 문서 심사 결과 - 베트남 내 신청자"
                    - paragraph [ref=e723]: "절차: □ 인증을 위한 2단계 절차 1단계: 수입 전 절차 - 치과용 임플란트의 의료기기 분류 2단계: 수입 전 절차 - 치과용 임플란트의 의료기기 유통 등록 □ 1단계: 수입 전 절차(치과용 임플란트의 의료기기 분류) ㅇ 분류 기준 - 시행규칙 05/2022/TT-BYT, 부록I, 섹션1, 파트II, 항목B, 8호 참고 - 분류 결과는 시행규칙 05/2022/TT-BYT, 부록 II에 명시된 양식에 따라 제시됨 - 분류 결과는 보건부 의료기기 관리 온라인 공공 서비스 시스템에 공개 게시됨 ㅇ 1단계는 2단계 진행을 위해서 반드시 필요한 단계임 □ 2 단계: 수입 전 절차(치과용 임플란트의 의료기기 유통 등록) ㅇ 신규 유통 등록: 두가지 경우 - 유통을 위해 최초로 등록하는 치과용 임플란트 - 등록번호를 부여받았으나 아래의 변경 사항이 있는 경우 1. 제품 소유주 2. 분류, 용도 및 사용 목적 변경 3. 품질 기준 변경 4. 제조 공장 및 제품 코드 추가 5. 기능에 영향을 미치는 원재료 변경 ㅇ 급행 처리 절차를 통한 유통 등록 조건: 두가지 경우 - 호주, 캐나다, 중국, EU, 일본, 한국, 스위스, 영국, 미국으로부터 자유판매증명서(CFS) 또는 시장허가를 받은 치과용 임플란트 - 베트남 내 상업적 유통을 위한 수입허가증 또는 유통(등록) 번호나 유통(등록)증명서를 받은 치과용 임플란트(2022년 1월 1일 이전에 취소된 경우는 제외) ㅇ 유통증명서: 시행규칙 10/2023/TT-BYT의 부록IV, 형식 3번에 따라 보건부에서 발급 ㅇ 유통 번호 유효기간: 무기한 ㅇ 2단계 완료시 수입산 치과용 임플란트에 유통 번호가 발급되며 베트남 국내 시장에서 상업적 목적으로 제한 없이 자유롭게 수입 및 유통될 수 있음"
                    - paragraph [ref=e724]: "유효기간: ㅇ 유통번호 및 유통인증서는 무기한 유효함"
