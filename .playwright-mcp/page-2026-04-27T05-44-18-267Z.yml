                  - generic [ref=e661]:
                    - paragraph [ref=e662]: "필요서류: 1. 기술구조문서(TCF)는 10년간 보관 필요 2. 기계류 CE 취득 시 전자파 적합성(EMC)* 지침(2014/30/EU)과 저전압(LVD)** 지침(2014/35/EU) 준수 및 시험 통과 필요 *전자파 적합성(EMC): 기기에서 방출되는 전자파 수준 평가 **지침과 저전압(LVD): 특정 전압 범위 내에서 전기 장비의 감전 및 기타 전기 위험에 대한 안전성 검사로 EU 및 EEA에서 전기 기기를 판매하는 제조업체 및 유통업체는 반드시 해당 지침을 준수하고 시험을 통과해야 함"
                    - paragraph [ref=e663]: "절차: 1. 제품이 적용되는 지침서(Directive) 파악 - 기계는 Machine Directive(2006/42/EC) - 기술자료분석/관련 규격, 적용 모듈 파악 및 요구조건 확인 2. 위험성 평가 3. 기술구조문서(TCF) 작성 - 제품 정의 - 사용 목적 - 디자인 문서 - 설계 및 생산 도면, 부품, 모듈 및 회로의 회로도 및 작업 절차에 대한 정보(간략히 기술) - 테스트 보고서 - 터키어 또는 원본 사용자 설명서 - 품질 경영 시스템(ISO 품질 경영 시스템 인증서, 제품 관련 규정에 명시된 경우) - 제품의 터키어 또는 영어 설치/조립 설명서 4. CE 인증서 발급 5. DoC(Declaration of Conformity) 선언 6. CE 인증마크 부착"
