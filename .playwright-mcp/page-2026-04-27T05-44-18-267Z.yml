                - listitem [ref=e683]:
                  - paragraph [ref=e684]: 발효 식품류, 절임 식품류
                  - generic [ref=e685]:
                    - paragraph [ref=e686]: "필요서류: ㅇ FDA 등록 (FR, FCE, SID, Labeling)에 필요한 서류 - 공장정보 : 공장명, 주소, 전화/팩스번호, 대표자명 - pH 4.6 이하 : 제품명, 살균온도/시간, 살균방법, 제품샘플 소량 - pH 4.7 이상 : 제품명, 제품명, 살균공정도, 열침투측정자료 (HP data), 살균공정근거자료, 제품샘플 소량 ㅇ FCS 테스트(FDA 21 CFR 규정)에 필요서류 - 기업정보 (기업명, 주소, 전화번호, 대표자명) - 제품정보 (제품명, 원료명, 시험용샘플 100cm X 100cm 또는 50g)"
                    - paragraph [ref=e687]: "절차: ㅇ 별도로 요구되는 인증은 없으며, 김치는 미 식품의약국(FDA)가 미 식품 관련 법에 따라 미국에서 유통되는 제품의 안전성을 관리 감독함 ㅇ 관련 법에 따라 FDA의 각종 식품 수입 규제를 준수해야 하며 대략적인 수출 절차는 하기와 같음 1. 수출 전 준비 수출 대상 김치의 성분(첨가물, 색소 등)이 미국에서 허용되는 성분인지 확인 2. FDA 및 공장&middot;공정 등록 김치를 제조&middot;포장&middot;보관하는 국내 공장은 FDA 식품시설등록(FFR / Food Facility Registration)을 통해 시설등록번호 획득 김치가 pH&middot;수분활성 등에 따라 산성/저산성 식품으로 분류될 경우, 공장등록(FCE) 및 공정등록(SID)이 요구될 수 있으므로 해당 조건을 충족하는지 확인 3. 라벨링&middot;영양성분 준비 제품명, 원재료, 알레르기 유발 성분, 순중량, 제조&middot;유통기한, 보관 방법, 제조업자&middot;주소, 원산지 등을 영문으로 표기하고, FDA 식품표시 규정을 지키는 라벨을 제작 영양성분표(Nutrition Facts)를 표시하기 위해 필수 영양성분 분석 시험을 진행하고, 결과를 바탕으로 라벨을 완성 4. 선적 전 사전통보 및 서류 선적 전에 미국 측에 식품 사전통보(Prior Notice)를 해야 하며, 수입자 또는 대행사가 FDA 시스템에 신고 인보이스, 패킹리스트, 선하증권(B/L) 등 기본 선적서류와 함께 FDA 등록번호, 사전통보번호(PNC) 등을 수입자에게 전달 5. 미국 도착 후 검사&middot;통관 미국 입항 후 세관(CBP) 신고와 동시에 FDA가 서류&middot;라벨&middot;제품에 대한 위험기반 검사를 진행할 수 있으며, 필요 시 샘플 검사(미생물, 잔류농약, 중금속 등)가 이뤄짐 문제가 없으면 통관&middot;세금 납부 후 물품이 반출되며, 만약 위반사항이 발견되면 보류&middot;반송&middot;폐기 조치가 있을 수 있으므로, 성분&middot;라벨&middot;위생관리(HACCP 등)를 사전에 철저히 준비하는 것이 중요함"
                    - paragraph [ref=e688]: "유효기간: ㅇ Facility Registration - 매 짝수년 10월 1일~12월 31일 사이 등록 갱신 필수 예) 2024년에 인증 받았으면, 2026년 말까지 유효함"
