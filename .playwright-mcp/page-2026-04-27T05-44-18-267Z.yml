                  - paragraph [ref=e768]: ㅇ 액체절연형(lubricant/oil-filled/liquid-immersed) 배전용 변압기 - 예시 ① 13.8 kV / 480 V, 1,000 kVA 유압식 배전 변압기 - 예시 ② 22.9 kV / 4160 V, 2,000 kVA 유압식 변압기 ㅇ 산업용, 상업용, 유틸리티용 배전 변압기 중 위 정의 범위에 해당하는 대부분의 유압식 변압기 ㅇ 미국 내 변전소, 공장, 상업 빌딩 등에 설치되는 일반 배전용 변압기필수
                  - generic [ref=e769]:
                    - paragraph [ref=e770]: "필요서류: - 시험 성적서 - 모델기술자료 - DOE 효율 기준대비 적합성 검토표 - CCMS 제출용 엑셀/입력 데이터 파일 - 내부서약서 - 설계 문서 (의무는 아니나 Audit 대비)"
                    - paragraph [ref=e771]: "절차: ① 제품 설계 및 사양 검토 - 제품이 DOE 규정상 Distribution Transformer 정의에 해당하는지 확인 : 전압, kVA, 액체절연 여부 등 ② 효율 시험 계획 수립 - DOE가 지정한 시험방법(IEEE C57 계열 시험 기반)을 반영해 무부하 손실(no-load loss), 부하손실(load loss), 효율(%) 측정 계획을 수립 ③ 공인 시험(or 자사 시험) 진행 : 각 정격점에서의 효율이 DOE 기준표 이상인지 확인 - 자체 시험설비가 규정 충족 가능한 경우 자가 시험 가능 - 시험기관(국내/국외)을 활용해 시험성적서 확보 ④ DOE Self-Certification 자료 작성 : CCMS(Compliance Certification Management System)에 제출할 데이터 시트 준비 - 모델별(또는 모델군)로 다음 정보 정리: 제조사 정보, 모델명/타입, 정격(kVA, 전압, 위상 등), 측정된 효율값, 시험방법 및 조건 ⑤ DOE CCMS 시스템 등록 ⑥ 내부/외부 문서화 및 활용방법 : &ldquo;DOE 10 CFR Part 431 Subpart K 준수&rdquo; 문구를 카탈로그, 기술자료, 제안서(Proposal) 등에 명시"
