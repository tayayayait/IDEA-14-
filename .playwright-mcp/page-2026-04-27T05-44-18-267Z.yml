                  - generic [ref=e709]:
                    - paragraph [ref=e710]: "필요서류: 1) 기술사양신고서 2) 위임장 (계약자의 대리인이 신청하는 경우) 3) 인증신청 보완서 및 인증신청 관련 확인사항 4) 제조공장 또는 사업장의 품질관리에 관한 설명서 5) 위탁생산 또는 수입에 관련된 계약 설명서 (위탁생산 또는 수입하는 경우에만 제출) 6) 출장시험 신청서 (출장시험을 희망하는 경우에만 제출)"
