                - generic [ref=e2263]:
                  - paragraph [ref=e2264]: "필요서류: 1. 기술구조문서(TCF)는 10년간 보관 필요 2. 기계류 CE 취득 시 전자파 적합성(EMC)* 지침(2014/30/EU)과 저전압(LVD)** 지침(2014/35/EU) 준수 및 시험 통과 필요 *전자파 적합성(EMC): 기기에서 방출되는 전자파 수준 평가 **지침과 저전압(LVD): 특정 전압 범위 내에서 전기 장비의 감전 및 기타 전기 위험에 대한 안전성 검사로 EU 및 EEA에서 전기 기기를 판매하는 제조업체 및 유통업체는 반드시 해당 지침을 준수하고 시험을 통과해야 함"
                  - paragraph [ref=e2265]: "절차: 1. 제품이 적용되는 지침서(Directive) 파악 - 기계는 Machine Directive(2006/42/EC) - 기술자료분석/관련 규격, 적용 모듈 파악 및 요구조건 확인 2. 위험성 평가 3. 기술구조문서(TCF) 작성 - 제품 정의 - 사용 목적 - 디자인 문서 - 설계 및 생산 도면, 부품, 모듈 및 회로의 회로도 및 작업 절차에 대한 정보(간략히 기술) - 테스트 보고서 - 터키어 또는 원본 사용자 설명서 - 품질 경영 시스템(ISO 품질 경영 시스템 인증서, 제품 관련 규정에 명시된 경우) - 제품의 터키어 또는 영어 설치/조립 설명서 4. CE 인증서 발급 5. DoC(Declaration of Conformity) 선언 6. CE 인증마크 부착"
                  - paragraph [ref=e2266]: "유효기간: 품목이 포함된 지침에 따라 3년 또는 5년"
                  - paragraph [ref=e2267]: 예상 비용 1 KRW / 예상 기간 22일
                - link "KOTRA" [ref=e2268] [cursor=pointer]:
                  - /url: https://dream.kotra.or.kr/dream/cms/com/index.do?MENU_ID=4030&sSearchVal=EV%20%EC%B6%A9%EC%A0%84%EC%86%8C(%EC%A0%84%EA%B8%B0%EC%B0%A8%20%EC%B6%A9%EC%A0%84%EC%86%8C)
                  - img [ref=e2269]
                  - text: KOTRA
              - listitem [ref=e2273]:
                - paragraph [ref=e2274]: "- 전압 공급이 220Vac, 50Hz인 벌크헤드형 LED 조명기구(Bulkhead Type LED Light Fittings), LED 다운라이트(LED Downlight) 또는 LED 플러드라이트(LED Floodlight) - 도로, 거리 및 터널 조명용으로 사용되며, 전압 공급이 1,000Vac, 50Hz 이하인 LED 도로 조명등(LED Road Light)"
                - generic [ref=e2275]:
                  - paragraph [ref=e2276]: "필요서류: 1. 인증 기관이 정한 양식에 따라 작성된 신청서 2. 수수료 3. 평가를 위한 품질 매뉴얼 및 관련 문서 4. 인증 기관과의 공식 연락을 담당할 공급업체의 담당자 정보"
                  - paragraph [ref=e2277]: "절차: 공급업체가 인증 기관에 인증 신청서를 제출--> 공급업체는 LED 조명 제품의 샘플을 인증 기관에 제출하여 초기 형식 시험(initial type tests)을 진행--> 인증 기관은 LED 조명 제품의 시험 보고서를 검토--> 인증 기관은 LED 조명 제품 생산 공장의 생산 설비, 생산 공정 및 완제품을 평가--> 모든 평가가 완료되면, 인증 기관은 공급업체에게 적합성 인증서(Certificate of Conformity)를 발급"
                  - paragraph [ref=e2278]: "유효기간: 1년 - 인증을 받은 LED 조명 제품은 인증 상태 유지를 위해 매년 재평가를 받아야 함 - 인증서 최초 발급 및 갱신 시, 공급업체는 연간 인증 비용을 납부해야 함"
                  - paragraph [ref=e2279]: 예상 비용 확실한 정보 없음 / 예상 기간 확실한 정보 없음일
