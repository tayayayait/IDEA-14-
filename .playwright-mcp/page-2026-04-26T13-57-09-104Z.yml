            - list [ref=e2164]:
              - listitem [ref=e2165]:
                - paragraph [ref=e2166]: "HS 제8443.32호에 해당하는 프린터 중 22/2018/TT-BTTTT Appendix 01에 따른 아래에 기재된 품목을 수입할 경우, 정보통신부(MIC)가 발급한 수입허가가 필요함 ① 도트매트릭스 프린터(Dot matrix printers) HS 8443.32.21 : A4 기준 분당 60매 이상 인쇄가 가능하거나, A3보다 긴 용지를 인쇄하는 데 사용되는 디지털 도트매트릭스 컬러 프린터 ② 레이저 프린터(Laser printers) HS 8443.32.31 : A4 기준 분당 60매 이상 인쇄가 가능하거나, A3보다 긴 용지를 인쇄하는 데 사용되는 디지털 레이저 컬러 프린터"
                - generic [ref=e2167]:
                  - paragraph [ref=e2168]: "필요서류: ① 수입허가 신청서 ② 수입하려는 각 인쇄장비의 카탈로그 ③ 유형별 필수 증빙서류의 인증 사본 - 인쇄업체 : 인쇄허가증(Printing License) 또는 인쇄활동 운영등록신고서 - 인쇄장비 수출&middot;입 허가기업 : 관련 법령에서 규정한 수출&middot;입 허가증 - 기관&middot;조직(법인격 보유) : 설립 결정문"
                  - paragraph [ref=e2169]: "절차: 1. 허가대상 확인 다음 각 호의 인쇄장비를 수입하려는 경우, 정보통신부(MIC)의 수입허가를 받아야 함 ① 인쇄 필름 또는 인쇄판(플레이트) 제작 장비 ② 디지털, 오프셋, 플렉소, 그라비어, 레터프레스기술을 사용하는 프린터 ③ 제책 관련 장비: 절단기, 책 접기, 제본 새들 스티처, 후가공(마감) 라인 ④ 컬러 복사기, 컬러 복사 기능이 있는 프린터 * 정보통신부(MIC)장관 규정 Circular 22/2018/TT-BTTTT Appendix 01에서 HS 품목별로 허가대상을 상세히 규정함 2. 수입자격 확인 인쇄장비를 수입할 수 있는 자는 다음과 같음 ① 인쇄업체 ② 인쇄장비의 수출&middot;입이 법률에 의해 허가된 기업 ③ 법인격을 갖추고 내부 업무 수행을 위해 인쇄장비 사용이 허용된 기관&middot;조직 3. 수입 전 정보통신부(MIC) 수입허가 신청 법령에서 규정한 수입자격을 보유한 자는, 수입 전에 아래의 신청 서류를 준비하여 베트남 정보통신부(MIC)에 제출해야 한다. 4. 제출 방식 온라인 공공서비스 시스템 / 우편 / 인편 제출 4. 수입허가 제출서류 수입 자격을 보유한 신청자는 정보통신부(MIC)에 다음 수입허가 신청서류를 제출해야 한다. ① 수입허가 신청서 ② 수입하려는 각 인쇄장비의 카탈로그 ③ 유형별 필수 증빙서류의 인증 사본 - 인쇄업체 : 인쇄허가증(Printing License) 또는 인쇄활동 운영등록신고서 - 인쇄장비 수출&middot;입 허가기업 : 관련 법령에서 규정한 수출&middot;입 허가증 - 기관&middot;조직(법인격 보유) : 설립 결정문 5. 회신기한 정보통신부는 완비된 신청서를 접수한 날로부터 5 근무일 이내에 인쇄 장비 수입허가를 발급하여야 함 만약, 허가 발급을 거부하는 경우에는 거부 사유를 명확히 기재한 서면 회신을 발행하여야 함"
                  - paragraph [ref=e2170]: "유효기간: 수입 건별 허가 제도 (법령상 명시된 유효기간 없음)"
                  - paragraph [ref=e2171]: 예상 비용 확실한 정보 없음 / 예상 기간 5일
                - link "KOTRA" [ref=e2172] [cursor=pointer]:
